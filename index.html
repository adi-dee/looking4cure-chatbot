<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eliz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --teal:#0d6b54;
  --teal-mid:#0e7a60;
  --teal-border:#b8dcd4;
  --g1:#eceae8;
  --g3:#c0bebb;
  --g9:#1a1917;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
}

/* ── Fill exactly whatever space Wix gives us ── */
html,body{
  height:100%;width:100%;
  margin:0;padding:0;
  font-family:var(--font);
  background:#ffffff;
  overflow:hidden;
}

#chat{
  display:flex;
  flex-direction:column;
  width:100%;
  height:100%;
  background:#ffffff;
  overflow:hidden;
}

/* ── Header ── */
.ph{
  padding:14px 16px 12px;
  background:var(--teal);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;position:relative;overflow:hidden;
}
.ph::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#ff6eb4,#ffd54f,#69d5a8,#60b8ff,#c084fc,#ff6eb4);
  background-size:220% 100%;animation:rb 4s linear infinite;
}
@keyframes rb{0%{background-position:0 0}100%{background-position:220% 0}}
.ph-av{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.ph-info{flex:1}
.ph-info h2{font-size:15px;font-weight:600;color:#fff;line-height:1.2}
.ph-info p{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px}
.ph-dot{
  width:8px;height:8px;border-radius:50%;
  background:#6ee7b7;flex-shrink:0;
  animation:dp 2.2s ease-in-out infinite;
}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Messages ── */
.msgs{
  flex:1;overflow-y:auto;
  padding:14px 13px 8px;
  display:flex;flex-direction:column;gap:9px;
  scroll-behavior:smooth;
  background:#ffffff;
}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--g1);border-radius:3px}

.msg{display:flex;flex-direction:column;max-width:86%;animation:mi .22s ease}
@keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end}

.bub{
  padding:10px 13px;border-radius:16px;
  font-size:14px;line-height:1.6;
}
.msg.bot .bub{
  background:#f6faf8;
  border:1px solid var(--teal-border);
  color:var(--g9);border-bottom-left-radius:4px;
}
.msg.user .bub{
  background:var(--teal);color:#fff;
  border-bottom-right-radius:4px;
}
.bub a{color:var(--teal)}
.msg.user .bub a{color:#a7f3d0}
.bub b{font-weight:600}

.mmeta{font-size:10px;color:var(--g3);margin-top:3px;padding:0 4px}
.msg.user .mmeta{text-align:right}

/* ── Read more ── */
.more-btn{
  display:inline-block;margin-top:6px;
  font-size:12px;color:var(--teal);
  background:none;border:none;cursor:pointer;
  font-family:var(--font);padding:0;text-decoration:underline;
}
.more-content{
  margin-top:8px;padding-top:8px;
  border-top:1px solid var(--teal-border);
  font-size:13px;line-height:1.65;color:var(--g9);
}

/* ── Suggestions ── */
.sugg-row{
  display:flex;flex-wrap:wrap;gap:5px;
  margin-top:4px;align-self:flex-start;
  animation:mi .28s ease;
}
.sugg{
  font-family:var(--font);font-size:12px;
  padding:5px 13px;border-radius:20px;
  border:1.5px solid var(--teal);
  color:var(--teal);background:transparent;
  cursor:pointer;transition:all .12s;white-space:nowrap;
}
.sugg:hover{background:var(--teal);color:#fff}
.sugg:disabled{opacity:.35;cursor:default}

/* ── Support card ── */
.scard{
  background:#fff0f7;border:1px solid #f5c0d8;
  border-radius:12px;padding:11px 13px;
  font-size:12.5px;line-height:1.6;
  color:#7a1a4a;margin-top:6px;
}
.scard strong{display:block;margin-bottom:6px;font-size:13px}
.scard a{color:#7a1a4a;font-weight:500}
.sline{margin-top:5px;padding-top:5px;border-top:1px solid #f5c0d8}

/* ── Typing ── */
.typ-wrap{align-self:flex-start;animation:mi .2s ease}
.typ{
  display:flex;align-items:center;gap:4px;
  padding:10px 13px;background:#f6faf8;
  border:1px solid var(--teal-border);
  border-radius:16px;border-bottom-left-radius:4px;width:fit-content;
}
.typ span{
  width:5px;height:5px;border-radius:50%;
  background:var(--teal-mid);opacity:.4;
  animation:td 1.2s ease-in-out infinite;
}
.typ span:nth-child(2){animation-delay:.15s}
.typ span:nth-child(3){animation-delay:.3s}
@keyframes td{0%,60%,100%{opacity:.4;transform:none}30%{opacity:1;transform:translateY(-3px)}}

/* ── Input ── */
.inp-area{
  padding:10px 11px;border-top:1px solid var(--g1);
  display:flex;align-items:center;gap:8px;
  background:#fff;flex-shrink:0;
}
.inp{
  flex:1;font-family:var(--font);font-size:15px;
  border:1.5px solid var(--g1);border-radius:22px;
  padding:9px 15px;background:#f6faf8;color:var(--g9);
  outline:none;resize:none;transition:border-color .14s;
  line-height:1.4;min-height:40px;max-height:80px;
}
.inp:focus{border-color:var(--teal)}
.inp::placeholder{color:var(--g3)}
.snd{
  width:38px;height:38px;border-radius:50%;
  background:var(--teal);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity .12s,transform .1s;
}
.snd:hover{opacity:.85}.snd:active{transform:scale(.93)}
.snd svg{width:15px;height:15px}

/* ── Disclaimer ── */
.disc{
  padding:5px 12px 6px;border-top:1px solid var(--g1);
  font-size:10px;color:var(--g3);
  text-align:center;background:#fff;flex-shrink:0;
}
</style>
</head>
<body>

<div id="chat">
  <div class="ph">
    <div class="ph-av">💊</div>

      </svg>
    </button>
  </div>

</div>

  'what else','something else','more','tell me more','and','so','right',
  'hm','hmm','lol','ok cool','oh','ah']);

// ══════════════════════════════════════════════════
// SEARCH ENGINE
// ══════════════════════════════════════════════════
function findEntry(q) {
  const clean = q.toLowerCase().trim().replace(/[?!.,]/g,'').trim();

  // Too short
  if (clean.length < 3) return null;

  // Guaranteed exact map
  if (GUARANTEED[clean]) return KB[GUARANTEED[clean]];

  // Distress
  const distress = ['help me','not ok','scared','crisis','distress',
    'desperate','afraid','hopeless','suicid','self harm','hurting',
    'depressed','anxious','not coping','struggling'];
  if (distress.some(w => clean.includes(w))) return KB.support;

  // Vague words → no match
  if (VAGUE.has(clean)) return null;

  // Word-level scoring — only words longer than 3 chars
  const words = clean.split(/\s+/).filter(w => w.length > 3);

  // If no meaningful words after filtering, return null
  if (words.length === 0 && clean.length < 6) return null;

  let best = null, bestScore = 0;

  Object.values(KB).forEach(entry => {
    let s = 0;
    entry.tags.forEach(tag => {
      const tagClean = tag.toLowerCase();
      // Exact full match
      if (clean === tagClean) { s += 25; return; }
      // Query contains full tag
      if (clean.includes(tagClean) && tagClean.length > 4) { s += 15; return; }
      // Tag contains full query (only meaningful queries)
      if (tagClean.includes(clean) && clean.length > 5) { s += 10; return; }
      // Word overlap
      const tagWords = tagClean.split(' ').filter(tw => tw.length > 3);
      tagWords.forEach(tw => words.forEach(qw => {
        if (tw === qw) s += 8;
        else if (tw.startsWith(qw) && qw.length > 4) s += 4;
        else if (qw.startsWith(tw) && tw.length > 4) s += 4;
      }));
    });
    if (s > bestScore) { bestScore = s; best = entry; }
  });

  // Require meaningful score
  return bestScore >= 8 ? best : null;
}

// ══════════════════════════════════════════════════
// UI
// ══════════════════════════════════════════════════
let expandSet = new Set();
const tn = () => new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
const sb = () => { const m = document.getElementById('msgs'); m.scrollTop = m.scrollHeight; };
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const nl2br = s => s.replace(/\n/g,'<br>');

function showWelcome() {
  const area = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `<div class="bub">Hey 👋 I'm <b>Eliz</b>. Ask me anything about HIV — treatment, prevention, cure research, or just getting your head around it all.</div>
  <div class="mmeta">${tn()}</div>`;
  area.appendChild(d);
  addSuggestions(['hiv','cure','prep'], true);
  sb();
}

function addUserMsg(text) {
  const area = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="bub">${esc(text)}</div><div class="mmeta">${tn()}</div>`;
  area.appendChild(d); sb();
}

function addBotMsg(entry) {
  const area = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg bot';
  const entryId = Object.keys(KB).find(k => KB[k] === entry);

  let html = `<div class="bub">${nl2br(entry.short || '')}`;
  if (entry.more && entryId && !expandSet.has(entryId)) {
    html += `<br><button class="more-btn" onclick="expandEntry('${entryId}',this)">Read more ↓</button>`;
  }
  html += `</div>`;

  if (entry.isSupport) {
    html += `<div class="scard">
      <strong>🤝 Here for you</strong>
      <div><b>Berliner AIDS-Hilfe</b><br>
        <a href="tel:+4930886400">+49 30 886 400 0</a><br>
        <a href="https://berlin.aidshilfe.de" target="_blank">berlin.aidshilfe.de</a>
      </div>
      <div class="sline">Medical helpline Germany 24/7: <a href="tel:116117"><b>116 117</b></a></div>
      <div class="sline">Side effects: <a href="https://nebenwirkungen.bund.de" target="_blank">nebenwirkungen.bund.de</a></div>
    </div>`;
  }

  html += `<div class="mmeta">${tn()}</div>`;
  d.innerHTML = html;
  area.appendChild(d);

  // Build fresh suggestion list — use entry sugg + rotate pool to avoid repeats
  let suggIds = (entry.sugg || []).filter(id => KB[id] && id !== entryId);
  if (suggIds.length < 3) {
    const pool = nextPool().filter(id => id !== entryId && !suggIds.includes(id) && KB[id]);
    suggIds = [...suggIds, ...pool].slice(0, 3);
  }
  addSuggestions(suggIds);
  sb();
}

function expandEntry(id, btn) {
  expandSet.add(id);
  const entry = KB[id];
  if (!entry?.more) return;
  const bub = btn.closest('.bub');
  btn.remove();
  const div = document.createElement('div');
  div.className = 'more-content';
  div.innerHTML = nl2br(entry.more);
  bub.appendChild(div); sb();
}

function addSuggestions(ids, isWelcome=false) {
  const area = document.getElementById('msgs');
  const valid = ids.filter(id => KB[id]).slice(0,3);
  if (!valid.length) return;
  const row = document.createElement('div');
  row.className = 'sugg-row';
  if (isWelcome) row.style.marginTop = '2px';
  valid.forEach(id => {
    const label = LABELS[id] || id;
    const btn = document.createElement('button');
    btn.className = 'sugg';
    btn.textContent = label;
    btn.onclick = () => {
      row.querySelectorAll('.sugg').forEach(b => b.disabled = true);
      row.style.opacity = '.4';
      addUserMsg(label);
      respond(null, id);
    };
    row.appendChild(btn);
  });
  area.appendChild(row); sb();
}

function showTyping() {
  const area = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'typ-wrap'; d.id = 'typ';
  d.innerHTML = `<div class="typ"><span></span><span></span><span></span></div>`;
  area.appendChild(d); sb();
}
function hideTyping() { const d = document.getElementById('typ'); if(d) d.remove(); }

function respond(query, forcedId) {
  showTyping();
  setTimeout(() => {
    hideTyping();
    if (forcedId && KB[forcedId]) { addBotMsg(KB[forcedId]); return; }
    const entry = findEntry(query);
    if (!entry) {
      const fb = FALLBACKS[fbIdx % FALLBACKS.length]; fbIdx++;
      const area = document.getElementById('msgs');
      const d = document.createElement('div');
      d.className = 'msg bot';
      d.innerHTML = `<div class="bub">${fb.msg}</div><div class="mmeta">${tn()}</div>`;
      area.appendChild(d);
      addSuggestions(fb.sugg); sb();
      return;
    }
    addBotMsg(entry);
  }, 350 + Math.random()*250);
}

function handleSend() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  addUserMsg(text); respond(text);
}

document.getElementById('inp').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});
document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

window.addEventListener('load', showWelcome);
</script>
</body>
</html>
